[BigMap]
;Map is now stretched to full screen, map scroll speed 2x, zoom in/out speed 3x
BigMap=1
;Make BACK work only when cursor is in lowest position on the screen 
BigMapBackFix=1
;SkyUI support - moves area name a bit higher, to avoid overlapping text
BigMapSkyUIsupport=0


