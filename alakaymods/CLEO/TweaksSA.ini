;Set how long the heli will fly around before it starts shooting (in milliseconds, for each wanted level).
DelayWanted3=10000	;default 10000
DelayWanted4=5000	;default 5000
DelayWanted5=3500	;default 3500
DelayWanted6=2000	;default 2000

;Heli shooting rate
;The game picks a number between 0.0 and 1.0 and checks if it's greater or equal to 0.15000001
;if it is - it sets the shooting rate to 150. If not - the it sets it to 400 (these are relative values, based on time).
;You can ignore the randomizer value and just set rate1 and rate2 to same values (lower values mean faster shooting)
HeliShootingRand=0.15000001	;default 0.15000001
HeliShootingRate1=150		;default 150
HeliShootingRate2=400		;default 400

;Heli shooting accuracy (0-6)
;Set how accurate police heli is:
;0 - best shooter, all bullets hit the player
;3 - game default
;6 - shoots "somewhere there"
HeliShootingAcc=3	;default 3

;SWAT position relative to heli - point where SWAT team appears and start descending, useful if you use
;non-vanilla police heli

UseCustomSWATpos=0

SWAT1X=-1.2
SWAT1Y=-1.0
SWAT1Z=-0.5
SWAT2X=1.2 
SWAT2Y=-1.0
SWAT2Z=-0.5
SWAT3X=-1.2
SWAT3Y=1.0 
SWAT3Z=-0.5
SWAT4X=1.2 
SWAT4Y=1.0 
SWAT4Z=-0.5

;       Default values
;SWAT1X=-1.2  SWAT1Y=-1.0  SWAT1Z=-0.5
;SWAT2X=1.2   SWAT2Y=-1.0  SWAT2Z=-0.5
;SWAT3X=-1.2  SWAT3Y=1.0   SWAT3Z=-0.5
;SWAT4X=1.2   SWAT4Y=1.0   SWAT4Z=-0.5


