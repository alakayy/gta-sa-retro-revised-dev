//
//	Type TWSA as cheatcode to reload settings. You need reload_TweaksSA.cs for it to work.
//
//	If you want to disable a setting - set it to default value.
//	Setting it to any other value (unless it's stated that you can use it) or 
//	quoting out a line will most likely crash the game.
