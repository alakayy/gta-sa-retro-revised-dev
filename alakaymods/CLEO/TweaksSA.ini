/////////////////////////////////////////////////////////////////////////////////////////
//    GAMEPLAY    ///////////////////////////////////////////////////////////////////////
/////////////////////////////////////////////////////////////////////////////////////////
[Gameplay]
;Set gang members/followers talk probability.
;The game picks a random 0...500, set to something like 50000 to make them talk less.
;Don't set lower than 57. Default 500.
GangTalkProb=500

;Increase distance at which gang members will stop when following CJ. Default 0.5
GangDistance=0.5

;Set min and max gang size on the streets (affects all gangs including GSF) (ini: Gameplay->GanSizeM*)
;Default min 1, max 5
GangSizeMin=1
GangSizeMax=5

;When emergency vehicles are leaving scene (like after extinguishing fire) they leave with siren on.
;With this setting enabled they will turn siren of after their job is done.
NoSirenWhenLeavingScene=0

;Set radius of water cannon - increases radius at which fires are extinguished.
;Default 2.0
WaterCannonRadius=2.0

;Set radius of fire extinguisher (affects only fire, not peds)
; WILL WORK ONLY WITH gta_sa.exe v1.0 by Hoodlum, most likely will crash on other versions
; Set to 0.0 to ignore this setting.
ExtinguisherRadius=0.0

;Opens doors in Area69. Will work only after passing Black Project mission.
;Set 1 to open. Set 0 to close. Set -1 to skip this setting completely.
;Might cause conflicts with Urbanize.
Area69open=-1

;Set traffic cruise speeds for civilian and police vehicles.
;For police vehicles this setting doesn't affect pursuit speed!
CruiseSpeedMin=13.0
CruiseSpeedMax=21.0
CruiseSpeedCopsMin=18.0
CruiseSpeedCopsMax=24.0

;Set multiplier for fire burning duration. Setting to 2.0 will make the fires last twice as long
;Allowed settings 0.1 to 3.0 (with 0.1 step - like 2.1 2.2 2.3 2.4).
FireDurationMult=1.0

;Store 4 cars in Groove street garage (vanilla allows only 2). Default 0 (disabled).
4carsInGantonGarage=0

;Disable CJ standing up when zooming with sniper or camera
;Set 0 Vanilla default, CJ will stand up. 1 method #1, 2 method #2 (more precise)
;Two methods are available because method #1 might affect some other camera modes. So far no bugs
;were found but who knows what might pop up...
SniperStandupFix=2

# DisableBonuses - Disable endgame and mission bonuses
# NOTE that it's "disable" so if set to 1 then it is DISABLED
TaxiNitroBunnyhop=1	#disable Nitro and BunnyHop ability for taxi
20HealthInAmbulance=1	#disable +20 health in ambulance
12dollarsInTaxis=0	#disable +12$ when entering taxi as a driver
ArmorInEnforcer=1	#disable armor when entering Enforcer
GolfclubInCaddy=1	#disable obtaining golfclub in Caddy
40caloriesInHotDog=1	#disable gaining 40 calories (20 fat) when entering HotDog
ShotgunInCopcarLS=1	#disable shotgun in LS police car
ShotgunInCopcarSF=1	#disable shotgun in SF police car
ShotgunInCopcarLV=1	#disable shotgun in LV police car
ShotgunInPolRanger=1	#disable shotgun in Police Ranger


;Enable 0.5 damage multiplier for player vehicles from the beginning of the game,same as 100% progress bonus
HalfDamageForPlayerVeh=0

;Sets default HP for all vehicles. Game default 1000.0
DefaultHPforAllVehicles=1000.0

;Disable restoring health when saving a game. Game will be saved with current health.
DontRestoreHealthOnSave=0

;Allows CJ to enter any train
EnterAnyTrain=0

WeatherTweakEnabled=0
