[SETTINGS]

NoShootWantedLevel = 1	// Motorbike cops will will only shoot if the wanted level is greater than this.

ImprovedCopAI = 0	// Set 0 if you don't want any other changes than preventing motorbike cops from shooting at the specified wanted level.

TyreBurstChance = 50	// If a cop is near CJ and is about to arrest him in his stopped car, but CJ drives away,
			// he will shoot him in the tire, for which you can set the success probability. Set 0 to turn it off.
			// Note that even at a setting of 100, the tyre won't always burst because the shot has to reach the car.

PickUpMode = 1		// If CJ has moved too far away from a cop on foot, the officer can be picked up
			// by a nearby cop vehicle, if available. Set 0 to turn it off.