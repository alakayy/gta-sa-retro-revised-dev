[Settings]
ShowDebug = 0
Density = 0.9             ; How many peds/vehicles to add. For example, 1.5 for more, 0.5 for less etc.
PedPopulationMult = 2.3   ; Same as MixSets (replaces it). Multiplies the popcycle values for pedestrian limit. This avoid the game stops spawning if Urbanize creates too many people, but also increases NPCs on the streets (which is also cool but may cause lag on weak PCs). MixSets is still recommended for peds spawning in further distances.
VehPopulationMult = 1.3   ; Same as above, for vehicles.

[RamdomDriveBys]
; Used by RAMDB script.
MinPassengers      = 1      ; The car need at least this number of passengers to attack. Use "2" for rarer but more realistic.
AttackPlayerChance = 20     ; Chance percent to also attack the player. Set "0" to only attack other gangs.
WeaponType         = 28     ; Weapon to use: https://library.sannybuilder.com/#/sa/script/enums/WeaponType

[MilitaryZones]
; Only enabled by zones that includes urbanization (eg Area 69).
NoWantedMode = 2   ; 0 = game default; 1 = stars only if someone spotted you (more realistic); 2 = stars only if you are flying the area; 3 = no stars.
Difficult    = 0   ; 0 = game default; 1 = full alert if someone spotted you (more realistic).

[Beach]
RescueVehicle = 422  ; Model ID for parked vehicle near lifeguard. Can use "-1" to disable it.

[Sweep]
ModelName = JANITOR

[Rain]
NpcsRainBehavior = 1  ; Set 0 to disable umbrellas etc.
