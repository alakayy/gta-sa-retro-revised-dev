[Settings]
DebugShowEnexName = 0 		; Shows the current enex name on screen. You can use that name for "EnexName*".
DebugForceEnexAccess = 0 	; Make configured interiors accessible. Just for testing, you can't exit some interiors.
ClipboardFunction = 0 		; Press X + 1 to copy coordinates and X + 2 to copy current interior name. Press CTRL + V to paste.

; Add-on icons
; How to add your own icon:
; 1. Insert an image file to MRDICNS.txd. Name it with format "radar_*spritename*" (max 14 characters including "radar_").
;    Make sure the resolution is squared (width and height are identical).
; 2. Add "Sprite*number*" in "Sprites" section below. Then, define your sprite name.
; 3. Create new section with "Sprite*number*" given above. 
; 4. Fill that section with necessary data (coords, enex name etc.).
