[CAMERA]                        

; The settings with the format below follow your respective vehicle camera mode
; -1.0 is an actual value here, so to disable you would need to comment out the line
; Format: 'Near' / 'Middle' / 'Far'

DistCar =    5.00 / 10.0 / 17.0   ; (6.0) Camera distance for cars according to the current vehicle camera mode
DistBike =   2.80 / 4.40 / 17.3   ; (3.5) for bikes 
HeightCar =  0.50 / 0.60 / 0.70   ; (0.4) Camera height for cars
HeightBike = 0.20 / 0.20 / 0.20   ; (0.2) for bikes
TweakFOV =   70.0 / 70.0 / 70.0   ; (70.0) FOV (zoom depth)

RestoreDistance = 0               ; Camera always returns to this vehicle camera mode: 0 = Previous mode. // 1 = Near. // 2 = Middle. // 3 = Far.

JumpcutRestore = 1                ; Instantly moves the camera behind the vehicle after aiming. Values greater than 1 are considered as time in ms for screen fading
JumpcutCarSpeed = 8.0             ; Camera jumps only if the car speed is equal or higher than this value

FPCameraCentering = 1             ; For first person mod. Rotates the camera to the front after driveby. Set 2 for additional fading effect
KeepAiming = 0                    ; Keep in driveby mode until you press the aim button again. // 0 = Off. // 1 = On. // 2 = In first person view only.

FreeLineOfSight = 0               ; Makes the vehicle temporarily invisible if it blocks your view too much
NoAngleLimit = 1                  ; 0 = Moving crosshair up and down is limited. // 1 = Free aiming up and down. Useful for aiming at helicopters.
_______________________________________________________________________________________________________________________________________

[EXCEPTIONS]                      ; Only vanilla driveby will be available, nitro fix will still be applied

DisableOnMission = 0              ; Set to 1 for conventional mission difficulty. Does not affect the 'EnableOnStory' setting.

