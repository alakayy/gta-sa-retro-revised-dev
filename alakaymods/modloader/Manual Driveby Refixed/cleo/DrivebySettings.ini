------------------------ Manual Driveby Refixed v.26.01.22 -----------------------

; During gameplay, type "MDRRELOAD" to reload the settings

[MAIN]                      ; Some general settings

DisableOnSAMP = 0           ; 0 = Enabled. // 1 = The mod automatically deactivates itself when playing SAMP. 

DrivebyControlType = 5      ; Affects gamepad only. Values greater than 2 disable sidelook function
                            ; 0 = L1 aim and shoot. // 1 = L1 aim and shoot, Circle finish. // 2 = L1 aim, Circle shoot. // 3 = L2 aim, R2 shoot. // 4 = R2 aim, L2 shoot.
                            ; For ginput layout 2: // 5 = L1 aim, R1 shoot. // 6 = R1 aim, L1 shoot.

DrivebyAimButton = RMB      ; Ignored by gamepad. Type key names, such as G, or + (it detects common keys) or virtual keycodes greater than 9

PreLoadIFP = 1              ; Fixes activation delay caused by ifp loading
DisableBikeWeakPoint = 1    ; Disables petrol tank weak point while aiming on a bike, so avoiding exploding your own bike

NoDrivingWhileAiming = 0    ; Disables driving ability while aiming: 0 = Off. // 1 = On all vehicles. // 2 = Only on bikes.
PrepareThrowAnim = 1        ; Set to 0 if you don't use any mod that fixes vanilla car animations (Links in ReadMe file)

CloseWindowsAgain = 1       ; Rolls up the windows of all closed and undamaged doors when leaving the car
WindshieldMode = 1          ; Breaks windshield when shooting forward: 0 = Off. // 1 = With new animations. // 2 = With old animations.

FixPedReactions = 2         ; Makes peds react to being targeted, similar to aiming on foot. Also allows recruiting gang members
                            ; Set to 2 for being able to provoke gang wars with driveby
RecruitBlip = 1             ; Creates a green cone above targeted grove street members if they are available for recruitment
_______________________________________________________________________________________________________________________________________

[WEAPONSWITCH]              ; Controls for switching weapons

DPadButtonsMode = 2         ; Affects gamepad only. // 0 = Off. // 1 = Left and Right. // 2 = Up and Down.

SideLookButtons = 0         ; E and Q on keyboard (with default game menu settings). L2 and R2 on gamepad. Disables sidelook function. Ignored in helis and planes
                            ; 0 = Off. // 1 = On. // 2 = Only while aiming.

UseMouseWheel = 2           ; 0 = Off. // 1 = On. // 2 = Only while aiming.

NextWeaponKey = 3           ; Type key names, such as G, or + (it detects common keys) or virtual keycodes greater than 9
LastWeaponKey = 1

EnableOnStory = 1           ; Enables weapon switching during driveby scenes in missions. ("Just Business" and "End of the Line")
_______________________________________________________________________________________________________________________________________

[WEAPONSETTINGS]

---- Availability of weapon classes based on vehicle subclasses ----

; Format: 'InstantHit' (= Guns) / 'Projectile' (= Grenades etc.) / 'AreaEffect' (= Spraycan etc.)
; With setting 0/0/0, the vehicles are treated like those in the exception list   

Cars =   1/1/1
Bikes =  1/1/1
Boats =  1/1/1
Helis =  1/1/1
Planes = 1/1/1
Trains = 1/1/1

---- Availability and shoot rate of each weapon in the vehicles based on weapon skill levels ----

FixShootRateOfNPC = 1       ; Applies the configured shoot rates to NPC drivebys, too. Normally, there's only one static shoot rate for every weapon during a driveby

; Add weapons to the list below you want to disable. 1.0 = enable by skill level, -1.0 = disable by skill level
; Weapon IDs: https://wiki.multitheftauto.com/wiki/Weapons 

; Format: 'Weapon ID' (not model ID) = Shoot rate by skill level: 'Poor' / 'Gangster' / 'Hitman'

; If there aren't any skill levels for a specific weapon (e.g. Minigun) then the value in the middle is applied
; For throwable weapons, the right and left values affect the throwing distance: Left for minimal, right for maximal distance

; Range: 0.01 - 9.99
; Special values: -1.0 = weapon not selectable. // 0.00 = weapon selectable but not usable. // 1.00 = same shootrate as on foot.

Default = 1.00 / 1.00 / 1.00  ; Setting for all guns that aren't configured below.
