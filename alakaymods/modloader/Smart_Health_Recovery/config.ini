; ============================================================================
; HEALTH RECOVERY MOD - CONFIGURATION FILE
; ============================================================================
; All values are validated and clamped to safe ranges by the mod.
; If you make a mistake, the mod will use sensible defaults.
;
; Restart the game after modifying this file for changes to take effect.
; ============================================================================

[GENERAL]
; Wait time before recovery starts after taking damage (in seconds)
; Minimum: 0, Maximum: 60
; Default: 5
waitTime=5

; Recovery speed multiplier. Higher = faster healing
; Minimum: 0.1, Maximum: 10.0
; Default: 1.0
recovery_velocity=1.0

; Trigger recovery when health drops below this percentage
; Minimum: 0, Maximum: 100
; Default: 50
start_at=50.0

; Recovery stops when health reaches this percentage
; Minimum: 0, Maximum: 100
; Default: 80
stop_at=75.0

; Bonus recovery when standing still or moving slowly
; Values: 0 (disabled), 1 (enabled)
; Default: 1
based_on_steady=1

; Bonus recovery based on fitness (stamina, muscle, fat stats)
; Values: 0 (disabled), 1 (enabled)
; Default: 1
based_on_healthy=1

; Bonus recovery when crouching
; Values: 0 (disabled), 1 (enabled)
; Default: 1
based_on_crouch=1

; ============================================================================

[STATS]
; Multiplier for stamina contribution to fitness (0.0 - 5.0)
; Higher = stamina gives more recovery bonus
; Default: 1.0
stamina_scale=1.0

; Multiplier for muscle contribution to fitness (0.0 - 5.0)
; Higher = muscle gives more recovery bonus
; Default: 1.0
muscle_scale=1.0

; Multiplier for fat penalty to fitness (0.0 - 5.0)
; Higher = fat reduces recovery bonus more
; Default: 1.0
fat_scale=1.0

; ============================================================================

[OVERLAY]
; Enable red flash when taking damage
; Values: 0 (disabled), 1 (enabled)
; Default: 1
damage_flash=0

; How long the damage flash lasts (in milliseconds)
; Minimum: 100, Maximum: 5000
; Default: 1500
damage_flash_duration=1500

; Enable blue flash when killing an enemy
; Values: 0 (disabled), 1 (enabled)
; Default: 1
kill_effect=0

; Enable directional damage indicators (shows where attacks came from)
; NOTE: Requires texture files in data\ folder
; Values: 0 (disabled), 1 (enabled)
; Default: 0
damage_indicators=0

; ============================================================================

[BONUS]
; Heal a percentage of lost health when getting a headshot kill
; This only applies if the player is damaged and you kill with a headshot
; Percentage of lost health healed: 5% by default
; Values: 0 (disabled), 1 (enabled)
; Default: 1
headshot_heal=1

; ============================================================================
; RECOVERY SYSTEM EXPLANATION
; ============================================================================
;
; The recovery system works as follows:
;
; 1. When player health drops below start_at%, recovery is triggered
; 2. Recovery waits for waitTime seconds before actually healing
; 3. Recovery heals the player gradually over time
; 4. Recovery stops when health reaches stop_at%
;
; The recovery SPEED is multiplied by several factors:
;
;   - Base Multiplier: 0.5x (foundation of all recovery)
;   - Steady Bonus: 1.5x when standing still, 0.5x when moving
;   - Crouch Bonus: 1.5x when crouching, 0.5x when standing
;   - Fitness Bonus: scales from 0.6x to 1.4x based on stats
;
; Example: If recovery_velocity=2.0 and player is steady + crouching + fit:
;   Final Heal Rate = 2.0 * 0.5 * 1.5 * 1.5 * 1.3 ≈ 2.9x the base rate
;
; ============================================================================
; TIPS FOR BALANCING
; ============================================================================
;
; Want harder gameplay?
;   - Increase waitTime (wait longer before healing)
;   - Decrease recovery_velocity (heal slower)
;   - Increase start_at (don't trigger recovery often)
;   - Disable based_on_steady (no bonus for standing still)
;
; Want easier gameplay?
;   - Decrease waitTime (heal faster after damage)
;   - Increase recovery_velocity (heal faster)
;   - Decrease start_at (trigger recovery more often)
;   - Increase stamina_scale (more benefit from fitness)
;
; ============================================================================
