[CONFIG]			
iNumSubsteps = 5				; A balanced choice for quality and performance (3-4 is typically ideal)
fSimulationSpeed = 1.05                          ; Keep at 1.0 for more realistic simulation
fRagdollLinearDamping = 0.07                    ; Slightly higher to maintain realism in movement
fRagdollAngularDamping = 0.9                    ; Increase for more rigid body behavior without being too "stiff"
fRagdollGravity = 1.1                           ; Standard gravity multiplier for balanced realism
fBulletPower = 1.25                              ; Moderate bullet force for realistic reactions
fExplosionPower = 1.8                           ; Balanced force for explosions
fSurfaceFriction = 0.85                         ; Adds a slight "slide" for more realistic movement
fRagDollFriction = 0.85                         ; Maintain a natural level of friction
fRagDollRestitution = 0.15			; Small bounce effect for realism
fRagDollJointDamping = 3.8                      ; Lower for more natural joint movement
fRagDollGetUpThreshold = 1.2			; Slightly increased to prevent immediate recovery
bVehicleShapeUseSpheres = true 			; True for better collision detection with vehicles
bUseDynamicObjects = true                      
fRagDollShapeMargin = 0.035                      ; Increase slightly for better body interaction
fWorldShapeMargin = 0.02                        ; Better contact with environmental objects
fDynamicObjectMass = 15000.0                    ; Reduced mass for more responsive object interactions
fWorldMinX = -4000.0				; World coordinates unchanged
fWorldMinY = -4000.0
fWorldMaxX = 4000.0
fWorldMaxY = 4000.0
iNumIPLInstances = 120000			; Optimized to handle new mods without hitting performance issues
